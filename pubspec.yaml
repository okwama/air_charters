name: air_charters
description: "AirCharters - Charter Beyond Borders. Book private jet charters and luxury air travel services globally. Experience premium aviation with our comprehensive booking platform for private flights, cargo transport, and medical evacuations."
publish_to: 'none'

version: 1.0.0+3

# App Store and Google Play Store metadata
homepage: https://aircharters.com
repository: https://github.com/citlogistics/air-charters
issue_tracker: https://github.com/citlogistics/air-charters/issues
documentation: https://docs.aircharters.com

# App metadata for stores
keywords:
  - private jet
  - charter flights
  - luxury travel
  - aviation
  - air transport
  - cargo charter
  - medical evacuation
  - business aviation

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # UI and Styling
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.0
  google_fonts: ^8.1.0
  
  # State Management and Navigation
  get: ^4.6.6
  get_storage: ^2.1.1
  provider: ^6.1.1
  
  # Icons
  lucide_icons_flutter: ^3.1.14+2
  
  # Animations
  lottie: ^3.1.2
  
  # Timer
  stop_watch_timer: ^3.0.0
  
  # Image caching
  cached_network_image: ^3.3.1
  
  # HTTP requests with caching (industry standard)
  dio: ^5.4.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.2
  dio_smart_retry: ^6.0.0
  http: ^1.1.2  # Keep for backwards compatibility
  
  # Paystack Flutter SDK
  flutter_paystack_plus: ^2.1.0  # Maintained Paystack SDK (no dependency conflicts)
  
  # WebView for in-app checkout
  webview_flutter: ^4.4.2
  
  # Local storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Country picker
  country_picker: ^2.0.26
  
  # Country flags with colors
  country_flags: ^3.0.0

  # JWT Token Management
  jwt_decoder: ^2.0.1
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Biometric Authentication
  local_auth: ^2.1.6
  
  # Encryption
  crypto: ^3.0.3
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # Loading States
  shimmer: ^3.0.0
  flutter_stripe: ^11.5.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # Google Maps and Location Services
  google_maps_flutter: ^2.6.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  
  # Date formatting
  intl: ^0.19.0
  
  # Material 3 Theming
  flex_seed_scheme: ^3.5.1

  # Local Notifications
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1
  
  # Real-Time Communication
  socket_io_client: ^2.0.3+1
  onesignal_flutter: ^5.3.4
  
  # Background Tasks


  # QR, Sharing, Files, and PDF support
  qr_flutter: ^4.1.0
  share_plus: ^10.0.2
  printing: ^5.13.3
  pdf: ^3.11.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.3.0
  test: ^1.22.0
  sentry_flutter: ^7.14.0
  uuid: ^4.1.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  
  # JSON Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/legal/
    - assets/logo/

# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo/logo.png"
  windows:
    generate: true
    image_path: "assets/logo/logo.png"
  macos:
    generate: true
    image_path: "assets/logo/logo.png"

# (Optional) You can define fonts here later if needed